
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LyricSmith — Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#00bcd4" />
  <link rel="icon" href="../assets/logo-mardi-icon.svg" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Neonderthaw&display=swap" rel="stylesheet" />
  
</head>

<body>
  <div class="hub-wrap">
    <header class="hub-header">
      <div class="hub-header-inner">
        <div class="hub-brand">
          <img src="../assets/images/logo.png" alt="LyricSmith Logo" />
          <div class="title">"The Hub"</div>
        </div>
          <div class="hub-actions">
            <a href="../index.html" class="icon-btn" title="Back to Library" aria-label="Back to Library">
              <i class="fas fa-home"></i>
            </a>
            <button id="theme-toggle-btn" class="icon-btn theme-toggle-btn" title="Toggle Light/Dark" aria-label="Toggle Light/Dark">
              <i class="fas fa-adjust"></i>
            </button>
          </div>
      </div>
    </header>

    <main class="hub-main">

      <section class="hub-grid">
        <!-- 1. MuseDice -->
        <button class="hub-card card" type="button" data-href="musedice.html" aria-label="MuseDice">
          <i class="fas fa-dice" aria-hidden="true"></i>
          <h3>MuseDice</h3>
          <p>Roll creative seeds: moods, metaphors, images, and lines to spark songs.</p>
        </button>

        <!-- 2. Suno Prompt Engine -->
        <button class="hub-card card" type="button" data-href="sunopromptengine.html" aria-label="Suno Prompt Engine">
          <i class="fas fa-music" aria-hidden="true"></i>
          <h3>Suno Prompt Engine</h3>
          <p>Turn your lyrics into Suno-ready prompts with structured guidance.</p>
        </button>

        <!-- 3. Create New Song -->
        <button id="create-song-card" class="hub-card card" type="button" aria-label="Create New Song">
          <i class="fas fa-pen-nib" aria-hidden="true"></i>
          <h3>Create New Song</h3>
          <p>Blank slate in the editor with section scaffolding ready to go.</p>
        </button>

        <!-- 4. Settings -->
        <button id="open-settings" class="hub-card card" type="button" aria-label="Settings">
          <i class="fas fa-cog" aria-hidden="true"></i>
          <h3>Settings</h3>
          <p>Set your OpenRouter key & model, custom system prompt, and manage export/import.</p>
        </button>
      </section>
    </main>

    <footer class="hub-footer">
      LyricSmith • local‑first • zero bloat • you got this.
    </footer>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Settings">
      <h2><i class="fas fa-sliders-h"></i> Settings</h2>

      <div class="row">
        <label for="apiKey">OpenRouter API Key</label>
        <input id="apiKey" type="text" placeholder="sk-or-..." autocomplete="off" />
        <div class="hint">Stored locally only. Used by Editor AI, MuseDice, and Suno Prompt Engine.</div>
      </div>

      <div class="row">
        <label for="defaultModel">Default Model (e.g. openrouter/auto, anthropic/claude-3.5, meta/llama-3.1)</label>
        <input id="defaultModel" type="text" placeholder="openrouter/auto" />
      </div>

      <div class="row">
        <label for="systemPrompt">Custom System Prompt (optional, shared across AI tools)</label>i
        <textarea id="systemPrompt" placeholder="You are a helpful songwriting assistant..."></textarea>
      </div>

      <div class="btn-row">
        <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
          <button id="saveSettings" class="btn" title="Save"><i class="fas fa-save"></i></button>
          <button id="testSettings" class="btn" title="Test API Key"><i class="fas fa-vial"></i></button>
          <button id="closeSettings" class="btn ghost" title="Close"><i class="fas fa-times"></i></button>
        </div>
        <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
          <input id="importFile" type="file" accept=".json" style="display:none;" />
          <button id="exportAll" class="btn" title="Export All"><i class="fas fa-download"></i></button>
          <button id="importAll" class="btn" title="Import"><i class="fas fa-upload"></i></button>
          <button id="clearAll" class="btn danger" title="Clear All"><i class="fas fa-trash"></i></button>
        </div>
      </div>

      <div class="hint">
        Export includes songs & settings. Import merges songs by ID and restores settings.
      </div>
    </div>
  </div>

  <!-- Tiny toast -->
  <div class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="../config.js"></script>
  <script type="module">
    import { createSong } from './songs.js';
    window.createSong = createSong;
  </script>
  <script>
    // ===== Theme =====
    (function initTheme(){
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.dataset.theme = saved;
      const btn = document.getElementById('theme-toggle-btn');
      btn?.addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        localStorage.setItem('theme', next);
      });
    })();

    // ===== Service Worker =====
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        function listenWaiting(worker){
          toast('Update ready — reload to apply.');
          // Optionally trigger skipWaiting on click:
          // worker.postMessage({ type: 'SKIP_WAITING' });
        }
        if (reg.waiting) listenWaiting(reg.waiting);
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker?.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && reg.waiting) {
              listenWaiting(reg.waiting);
            }
          });
        });
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          // page will reload automatically after activation
        });
      });
    }

    // ===== Toast helper =====
    function toast(msg) {
      let container = document.querySelector('.toast-container');
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      container.appendChild(t);
      requestAnimationFrame(() => t.classList.add('show'));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 2600);
    }

    document.querySelectorAll('.hub-card.card').forEach(card=>{
      card.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });
    });

    // Handle navigation cards
    document.querySelectorAll('[data-href]').forEach(card => {
      card.addEventListener('click', () => {
        const url = card.getAttribute('data-href');
        if (url) window.location.href = url;
      });
    });

    // ===== Create New Song → jump to editor =====
    document.getElementById('create-song-card')?.addEventListener('click', () => {
      const songs = JSON.parse(localStorage.getItem('songs') || '[]');
      const song = createSong('New Song', '');
      songs.push(song);
      localStorage.setItem('songs', JSON.stringify(songs));
      window.location.href = `editor/editor.html?songId=${song.id}`;
    });

    // ===== Settings Modal =====
    const modal = document.getElementById('settings-modal');
    const openBtn = document.getElementById('open-settings');
    const closeBtn = document.getElementById('closeSettings');
    const saveBtn = document.getElementById('saveSettings');
    const testBtn = document.getElementById('testSettings');
    const exportBtn = document.getElementById('exportAll');
    const importBtn = document.getElementById('importAll');
    const clearBtn = document.getElementById('clearAll');
    const importFile = document.getElementById('importFile');

    const apiKeyEl = document.getElementById('apiKey');
    const modelEl = document.getElementById('defaultModel');
    const sysPromptEl = document.getElementById('systemPrompt');

    function openModal() {
      // load settings
      apiKeyEl.value = localStorage.getItem('openrouterApiKey') || '';
      modelEl.value = localStorage.getItem('openrouterModel') || (window.CONFIG?.defaultModel || '');
      sysPromptEl.value = localStorage.getItem('systemPrompt') || '';
      modal.classList.add('visible');
      modal.setAttribute('aria-hidden', 'false');
    }
    function closeModal() {
      modal.classList.remove('visible');
      modal.setAttribute('aria-hidden', 'true');
    }

    openBtn?.addEventListener('click', openModal);
    closeBtn?.addEventListener('click', closeModal);
    modal?.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // Save settings (sync to both localStorage and window.CONFIG so Editor picks it up)
    saveBtn?.addEventListener('click', () => {
      const key = apiKeyEl.value.trim();
      const model = modelEl.value.trim() || 'openrouter/auto';
      const sys = sysPromptEl.value;

      localStorage.setItem('openrouterApiKey', key);
      localStorage.setItem('openrouterModel', model);
      localStorage.setItem('systemPrompt', sys);

      window.CONFIG = window.CONFIG || {};
      window.CONFIG.openrouterApiKey = key;
      window.CONFIG.defaultModel = model;

      toast('Settings saved');
    });

    testBtn?.addEventListener('click', async ()=>{
      const key = (document.getElementById('apiKey')?.value || '').trim();
      if(!key){ toast('Enter a key first'); return; }
      try{
        const r = await fetch('https://openrouter.ai/api/v1/models', {
          headers: { 'Authorization': `Bearer ${key}` }
        });
        toast(r.ok ? 'API key looks good' : `API test failed (${r.status})`);
      }catch(e){ toast('Network error while testing'); }
    });

    // Export All (songs + settings)
    exportBtn?.addEventListener('click', () => {
      const payload = {
        version: '1.1',
        exportDate: new Date().toISOString(),
        songs: JSON.parse(localStorage.getItem('songs') || '[]'),
        settings: {
          theme: localStorage.getItem('theme') || 'dark',
          openrouterApiKey: localStorage.getItem('openrouterApiKey') || '',
          openrouterModel: localStorage.getItem('openrouterModel') || '',
          systemPrompt: localStorage.getItem('systemPrompt') || ''
        }
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `lyricsmith-backup-${new Date().toISOString().split('T')[0]}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      toast('Exported library & settings');
    });

    // Import All (merge songs by id, restore settings)
    importBtn?.addEventListener('click', () => importFile.click());
    importFile?.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);

        if (Array.isArray(data?.songs)) {
          const existing = JSON.parse(localStorage.getItem('songs') || '[]');
          const byId = new Map(existing.map(s => [s.id, s]));
          let merged = 0;
          data.songs.forEach(s => {
            if (!byId.has(s.id)) {
              byId.set(s.id, s);
              merged++;
            } else {
              const current = byId.get(s.id);
              // prefer the newer lastEditedAt
              const curTime = new Date(current.lastEditedAt || 0).getTime();
              const newTime = new Date(s.lastEditedAt || 0).getTime();
              if (newTime > curTime) byId.set(s.id, s);
            }
          });
          localStorage.setItem('songs', JSON.stringify(Array.from(byId.values())));
          toast(`Imported ${merged} new song(s)`);
        }

        if (data?.settings) {
          const s = data.settings;
          if ('openrouterApiKey' in s) localStorage.setItem('openrouterApiKey', s.openrouterApiKey || '');
          if ('openrouterModel' in s) localStorage.setItem('openrouterModel', s.openrouterModel || '');
          if ('systemPrompt' in s) localStorage.setItem('systemPrompt', s.systemPrompt || '');
          if ('theme' in s) localStorage.setItem('theme', s.theme || 'dark');

          window.CONFIG = window.CONFIG || {};
          window.CONFIG.openrouterApiKey = localStorage.getItem('openrouterApiKey') || '';
          window.CONFIG.defaultModel = localStorage.getItem('openrouterModel') || '';

          toast('Settings restored');
        }

        e.target.value = '';
      } catch (err) {
        console.error(err);
        toast('Import failed');
      }
    });

    // Clear All (keeps theme so you don’t get blinded)
    clearBtn?.addEventListener('click', () => {
      if (!confirm('Clear ALL LyricSmith data (songs & settings)? This cannot be undone.')) return;
      const theme = localStorage.getItem('theme') || 'dark';
      localStorage.clear();
      localStorage.setItem('theme', theme);
      toast('All data cleared');
    });
  </script>
</body>
</html>
