
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LyricSmith</title>
    <link rel="stylesheet" href="src/styles/theme.css">
    <link rel="stylesheet" href="src/styles/design-system.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#6366f1">
    <link rel="icon" href="/assets/logo-mardi-icon.svg">
    <!-- Use a single up-to-date Font Awesome version -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family= &display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="lib/mammoth.browser.min.js"></script>
    <script src="config.js"></script>
</head>
<body class="bg-bg text-text">
  <div class="main-box">
    <header class="app-header">
      <div class="header-top">
        <div class="app-logo">
          <img src="assets/images/logo.png" alt="LyricSmith" class="main-logo-img">
        </div>

        <div class="header-actions">
          <a href="hub/hub.html" class="header-icon-btn" title="Open Hub" aria-label="Open Hub">
            <i class="fas fa-th-large"></i>
          </a>
          <button id="theme-toggle-btn" class="header-icon-btn theme-toggle-btn" title="Toggle Light/Dark" aria-label="Toggle Light or Dark">
            <i class="fas fa-adjust"></i>
          </button>
        </div>
      </div>
      <div id="tab-toolbar" class="toolbar"></div>
    </header>
    <main id="app">
      <section id="songs" class="tab active">
        <div class="page-content songs-page">
          <div id="song-list" class="song-list"></div>
        </div>
      </section>
      <section id="tab-musedice" class="tab">
        <div class="musedice shell">
          <div class="panel left glass grad-border">
            <h2 class="gradient-text">MuseDice</h2>
            <p class="sub">Roll structured song ideas with weighted constraints.</p>

            <div class="grid two">
              <div>
                <label>Vibe</label>
                <select id="md-vibe" class="select">
                  <option>Dusty Soul</option><option>Psychedelic Rock</option><option>Alt-R&B</option>
                  <option>Folk Noir</option><option>Lo‑fi Gospel</option>
                </select>
              </div>
              <div>
                <label>Tempo (BPM)</label>
                <input id="md-bpm" type="number" class="input" min="60" max="200" value="92"/>
              </div>
              <div>
                <label>Key</label>
                <select id="md-key" class="select">
                  <option>C</option><option>G</option><option>D</option><option>A</option><option>E</option>
                  <option>F</option><option>Bb</option><option>Eb</option>
                </select>
              </div>
              <div>
                <label>Time</label>
                <select id="md-time" class="select">
                  <option>4/4</option><option>6/8</option><option>12/8</option><option>3/4</option>
                </select>
              </div>
            </div>

            <div class="chip-row">
              <button class="chip" data-chip="moody">Moody</button>
              <button class="chip" data-chip="anthemic">Anthemic</button>
              <button class="chip" data-chip="groove">Groove‑forward</button>
              <button class="chip" data-chip="minimal">Minimal</button>
              <button class="chip" data-chip="cinematic">Cinematic</button>
            </div>

            <div class="controls">
              <button id="md-roll" class="btn-primary" title="Roll"><i class="fas fa-dice"></i></button>
              <button id="md-lock-seed" class="btn-ghost" title="Seed Lock"><i class="fas fa-lock"></i></button>
              <button id="md-copy" class="btn-ghost" title="Copy"><i class="fas fa-copy"></i></button>
              <span id="md-seed" class="seed">seed: —</span>
            </div>
          </div>

          <div class="panel right glass grad-border">
            <div class="tabs tiny">
              <button class="tab-btn active" data-pane="md-brief">Brief</button>
              <button class="tab-btn" data-pane="md-chords">Chords</button>
              <button class="tab-btn" data-pane="md-lyrics">Lyric Starters</button>
            </div>
            <div id="md-brief"  class="pane active"><textarea id="md-brief-out"  class="textarea" rows="12" placeholder="Creative brief..."></textarea></div>
            <div id="md-chords" class="pane"><textarea id="md-chords-out" class="textarea" rows="12" placeholder="Chord skeleton..."></textarea></div>
            <div id="md-lyrics" class="pane"><textarea id="md-lyrics-out" class="textarea" rows="12" placeholder="Hooks, images, title seeds..."></textarea></div>
          </div>
        </div>
      </section>
      <section id="tab-suno" class="tab">
        <div class="suno shell">
          <div class="panel left glass grad-border">
            <h2 class="gradient-text">Suno Prompt Studio</h2>
            <p class="sub">Craft structured prompts with tone, scene, and mix notes.</p>

            <label>Title</label>
            <input id="s-title" class="input" placeholder="Song title (optional)"/>

            <label>Concept</label>
            <textarea id="s-concept" class="textarea" rows="4" placeholder="What is the song about? imagery, story, mood..."></textarea>

            <div class="grid two">
              <div>
                <label>Genre</label>
                <select id="s-genre" class="select">
                  <option>Alt‑R&B</option><option>Indie Pop</option><option>Neo‑Soul</option>
                  <option>Blues‑rock</option><option>Synthwave</option>
                </select>
              </div>
              <div>
                <label>Feel</label>
                <select id="s-feel" class="select">
                  <option>Slow burn</option><option>Groove‑forward</option>
                  <option>Anthemic</option><option>Dreamy</option>
                </select>
              </div>
            </div>

            <div class="chip-row">
              <button class="chip" data-style="warm tape">Warm tape</button>
              <button class="chip" data-style="wide stereo">Wide stereo</button>
              <button class="chip" data-style="vocal up">Vocal up</button>
              <button class="chip" data-style="lo‑fi edges">Lo‑fi edges</button>
              <button class="chip" data-style="cinematic build">Cinematic build</button>
            </div>

            <div class="grid two">
              <div>
                <label>Key (optional)</label>
                <select id="s-key" class="select"><option></option><option>C</option><option>G</option><option>D</option><option>A</option></select>
              </div>
              <div>
                <label>Tempo (BPM, optional)</label>
                <input id="s-bpm" class="input" type="number" min="60" max="200" placeholder="92"/>
              </div>
            </div>

            <div class="controls">
              <button id="s-generate" class="btn-primary" title="Build A/B"><i class="fas fa-wand-magic"></i></button>
              <button id="s-copy-a" class="btn-ghost" title="Copy A"><i class="fas fa-copy"></i></button>
              <button id="s-copy-b" class="btn-ghost" title="Copy B"><i class="fas fa-copy"></i></button>
              <span id="s-count" class="seed">0 chars</span>
            </div>
          </div>

          <div class="panel right glass grad-border">
            <div class="tabs tiny">
              <button class="tab-btn active" data-pane="s-a">Prompt A</button>
              <button class="tab-btn" data-pane="s-b">Prompt B</button>
              <button class="tab-btn" data-pane="s-notes">Mix Notes</button>
            </div>
            <div id="s-a" class="pane active"><textarea id="s-out-a" class="textarea" rows="12"></textarea></div>
            <div id="s-b" class="pane"><textarea id="s-out-b" class="textarea" rows="12"></textarea></div>
            <div id="s-notes" class="pane"><textarea id="s-notes-out" class="textarea" rows="12" placeholder="Reference tracks, arrangement, instrumentation notes…"></textarea></div>
          </div>
        </div>
      </section>
    </main>
  </div>
    <script>
        // Register service worker and check for updates
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  let container = document.querySelector('.toast-container');
                  if (!container) {
                    container = document.createElement('div');
                    container.className = 'toast-container';
                    document.body.appendChild(container);
                  }
                  const toast = document.createElement('div');
                  toast.className = 'toast toast-info';
                  toast.innerHTML = `Update available! <a href="#" id="reload-app">Refresh</a>`;
                  container.appendChild(toast);
                  setTimeout(() => toast.classList.add('show'), 10);
                  document.getElementById('reload-app')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (reg.waiting) {
                      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                    }
                    location.reload();
                  });
                  setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                  }, 10000);
                }
              });
            });
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              // New service worker has taken control
            });
          });
        }
    </script>
    <script type="module" src="script.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
