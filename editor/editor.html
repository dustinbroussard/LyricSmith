<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricSmith- Editor Mode</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="editor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Neonderthaw&display=swap" rel="stylesheet">
</head>
<body>

    <div id="editor-mode" class="editor-mode-overlay" style="display: flex;">
        <div class="editor-header">
            <div id="editor-song-info" class="song-info"></div>
            <div class="editor-controls">
             

                <button id="toggle-chords-btn" class="icon-btn" title="Toggle Chords">
                    <i class="fas fa-guitar"></i>
                </button>
                <button id="toggle-read-only-btn" class="icon-btn" title="Performance Mode">
                    <i class="fas fa-lock"></i>
                </button>
                <div class="divider"></div>

                <button id="decrease-font-btn" class="icon-btn" title="Decrease Font Size">
                    <i class="fas fa-minus"></i>
                </button>
                <span id="font-size-display"></span>
                <button id="increase-font-btn" class="icon-btn" title="Increase Font Size">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="divider"></div>
                <button id="theme-toggle-btn" class="icon-btn theme-toggle-btn" title="Toggle Theme"><i class="fas fa-adjust"></i></button>
                <button id="exit-editor-btn" class="icon-btn" title="Exit Editor">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <div id="lyrics-editor-container">
            <div class="gutter" id="syllable-gutter"></div>
            <div id="lyrics-display"></div>
            <button id="copy-lyrics-btn" class="icon-btn copy-lyrics-btn" title="Copy Lyrics">
                    <i class="fas fa-copy"></i>
         </button>

        </div>

        <div class="editor-footer">
            <div class="footer-controls">
                <label for="measure-mode-toggle" class="control-label">Measure</label>
                <label class="switch">
                    <input type="checkbox" id="measure-mode-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
            <div class="footer-controls">
                <label for="tempo-input" class="control-label">BPM</label>
                <input type="number" id="tempo-input" value="120" min="60" max="240">
            </div>
            <div class="footer-controls">
                <label for="rhyme-mode-toggle" class="control-label">Rhyme</label>
                <label class="switch">
                    <input type="checkbox" id="rhyme-mode-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
	
        <button id="scroll-to-top-btn" class="icon-btn scroll-to-top-btn" title="Scroll to Top">
            <i class="fas fa-arrow-up"></i>
        </button>
    </div>

    <script src="../config.js"></script>
    <script src="editor.js"></script>
</body>
</html>
